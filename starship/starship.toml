# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true
command_timeout = 1000
# Use the color palette
palette = "catppuccin_frappe"

#right_format = "$azure"

# Begin theme 'Dracula'
[character]
#error_symbol = "[╬╗](bold red)"
#success_symbol = "[╬╗](bold green)"

[cmd_duration]
style = "bold yellow"

[directory]
style = "bold green"
read_only = " ¾░î¥"

[git_branch]
symbol = "´Éİ "
style = "bold pink"

[hostname]
ssh_symbol = "¯¼ü "
style = "bold purple"

[username]
format = "[$user]($style) on "
style_user = "bold cyan"

# Define Dracula color palette
[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"

# End theme 'Dracula'

# Begin theme 'Catppuccin Frapp├®'
# Colors sourced from catppuccin/catppuccin-vsc v3.18.1
[palettes.catppuccin_frappe]
background   = "#303446"
foreground   = "#c6d0f5"
current_line = "#414559"
comment      = "#737994"
cyan         = "#81c8be"
green        = "#a6d189"
orange       = "#ef9f76"
pink         = "#f4b8e4"
purple       = "#ca9ee6"
red          = "#e78284"
yellow       = "#e5c890"
# End theme 'Catppuccin Frapp├®'

# Begin theme 'Catppuccin Macchiato'
# Colors sourced from catppuccin/catppuccin-vsc v3.18.1
[palettes.catppuccin_macchiato]
background   = "#24273a"
foreground   = "#cad3f5"
current_line = "#363a4f"
comment      = "#6e738d"
cyan         = "#8bd5ca"
green        = "#a6da95"
orange       = "#f5a97f"
pink         = "#f5bde6"
purple       = "#c6a0f6"
red          = "#ed8796"
yellow       = "#eed49f"
# End theme 'Catppuccin Macchiato'

[git_status]
style = "bold red"
staged = '[++\($count\)](green)'
ahead = 'Ôçí${count}'
diverged = 'ÔçòÔçí${ahead_count}Ôçú${behind_count}'
behind = 'Ôçú${count}'

[azure]
disabled = true
#format = 'on [$symbol($username)]($style) '
format = 'on [$symbol($subscription)]($style) '
symbol = '¾░áà '
style = "bold orange"
# style = 'blue bold'
subscription_aliases ={ "AzureCloud" = "Azure", "AzureChinaCloud" = "Azure China", "AzureGermanCloud" = "Azure Germany", "AzureUSGovernment" = "Azure Government" }

